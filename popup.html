<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesan Blur Settings</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <!-- SVG Icon representing a shield or blur -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          <path d="M9 12h6"></path>
        </svg>
        <h1>Lesan Blur</h1>
      </div>
      <p class="subtitle">Making social media safer.</p>
    </header>

    <main>
      <div class="setting-row">
        <div class="setting-info">
          <h2>Active Filtering</h2>
          <p>Blur offensive words automatically</p>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggleExtension" checked>
          <span class="slider round"></span>
        </label>
      </div>

      <div class="status-card" id="statusCard">
        <div class="status-indicator"></div>
        <span id="statusText">Protection is ON</span>
      </div>
    </main>

    <footer>
      <p>Powered by AI-Ready Dictionaries</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
